---
- name: Check whether MACs are on NACced printer ports
  hosts: switches
  gather_facts: no
  connection: network_cli

  vars:
    csv_input_path: "/tmp/printer_macs.csv"
    csv_output_path: "/tmp/printer_macs_nac_results.csv"
    csv_mac_column_number: 4
    nac_acl_line: "ip access-group ACL-DEFAULT-CLOSED in"

  pre_tasks:
    - name: Read CSV rows and normalize MACs from column 4
      shell: |
        {{ ansible_playbook_python | quote }} - <<'PY'
        import csv
        import json
        import os
        import re
        import sys

        input_path = os.environ["CSV_INPUT_PATH"]
        column_number = int(os.environ["CSV_MAC_COLUMN_NUMBER"])
        column_index = column_number - 1

        def normalize_mac(value):
            raw = (value or "").strip()
            if not raw:
                return {
                    "normalized": "",
                    "reason": "empty_mac",
                    "valid": False,
                }

            hex_only = re.sub(r"[^0-9A-Fa-f]", "", raw)
            if len(hex_only) != 12:
                return {
                    "normalized": "",
                    "reason": "invalid_mac_format",
                    "valid": False,
                }

            normalized = ".".join(
                [hex_only[0:4], hex_only[4:8], hex_only[8:12]]
            ).lower()
            return {
                "normalized": normalized,
                "reason": "",
                "valid": True,
            }

        if not os.path.exists(input_path):
            print(json.dumps({"error": f"CSV input file not found: {input_path}"}))
            sys.exit(1)

        with open(input_path, newline="", encoding="utf-8-sig") as handle:
            reader = csv.reader(handle)

            try:
                header = next(reader)
            except StopIteration:
                print(json.dumps({"error": "CSV input file is empty"}))
                sys.exit(1)

            if len(header) <= column_index:
                print(
                    json.dumps(
                        {
                            "error": (
                                f"CSV has {len(header)} columns, "
                                f"but column {column_number} was requested"
                            )
                        }
                    )
                )
                sys.exit(1)

            rows = []
            target_macs = []
            seen = set()

            for row_number, row in enumerate(reader, start=2):
                mac_value = row[column_index] if len(row) > column_index else ""
                normalized = normalize_mac(mac_value)

                rows.append(
                    {
                        "columns": row,
                        "mac": normalized["normalized"],
                        "mac_lookup_reason": normalized["reason"],
                        "row_number": row_number,
                    }
                )

                if normalized["valid"] and normalized["normalized"] not in seen:
                    seen.add(normalized["normalized"])
                    target_macs.append(normalized["normalized"])

        print(
            json.dumps(
                {
                    "header": header,
                    "rows": rows,
                    "target_macs": target_macs,
                }
            )
        )
        PY
      args:
        executable: /bin/sh
      environment:
        CSV_INPUT_PATH: "{{ csv_input_path }}"
        CSV_MAC_COLUMN_NUMBER: "{{ csv_mac_column_number }}"
      register: csv_input_raw
      changed_when: false
      run_once: true
      delegate_to: localhost

    - name: Store parsed CSV data on the control node
      set_fact:
        csv_input_data: "{{ csv_input_raw.stdout | from_json }}"
      run_once: true
      delegate_to: localhost
      delegate_facts: true

    - name: Show CSV processing summary
      debug:
        msg:
          - "Input CSV: {{ csv_input_path }}"
          - "Output CSV: {{ csv_output_path }}"
          - "Rows loaded: {{ hostvars['localhost'].csv_input_data.rows | length }}"
          - "Unique MACs to query: {{ hostvars['localhost'].csv_input_data.target_macs | length }}"
      run_once: true

  tasks:
    - name: Initialize per-switch findings
      set_fact:
        mac_interface_results: []
        switch_mac_findings: []

    - name: Look up each MAC in MAC table
      cisco.ios.ios_command:
        commands:
          - "show mac address-table address {{ item }}"
      loop: "{{ hostvars['localhost'].csv_input_data.target_macs | default([]) }}"
      register: mac_lookup
      when: hostvars['localhost'].csv_input_data.target_macs | default([]) | length > 0

    - name: Parse learned interface for MACs found on this switch
      set_fact:
        mac_interface_results: >-
          {{
            mac_interface_results + [
              {
                'switch': inventory_hostname,
                'mac': item.item,
                'interface': learned_interface
              }
            ]
          }}
      vars:
        # Read the MAC table data row directly from stdout_lines and take the
        # last token as the interface/port value.
        mac_table_entry: >-
          {{
            (
              item.stdout_lines
              | default([])
              | first
              | default([])
              | select('match', '^\s*\d+\s+\S+\s+\S+\s+\S+')
              | list
              | first
            ) | default('', true)
          }}
        learned_interface: >-
          {{
            (
              mac_table_entry.split()
              | last
            ) | default('', true)
          }}
      loop: "{{ mac_lookup.results | default([]) }}"
      when: learned_interface | default('') | length > 0

    - name: Mark MACs learned on port-channels as excluded
      set_fact:
        switch_mac_findings: "{{ switch_mac_findings + [ result_obj ] }}"
      vars:
        result_obj:
          switch: "{{ item.switch }}"
          mac: "{{ item.mac }}"
          interface: "{{ item.interface }}"
          nacced: "excluded"
          reason: "learned_on_port_channel"
      loop: "{{ mac_interface_results }}"
      when: item.interface is match('^(Po\d+|Port-channel\d+)$')

    - name: Check running config for valid non-port-channel interfaces
      cisco.ios.ios_command:
        commands:
          - "show running-config interface {{ item.interface }}"
      loop: "{{ mac_interface_results }}"
      when: item.interface is not match('^(Po\d+|Port-channel\d+)$')
      register: int_config

    - name: Build NAC findings for access interfaces
      set_fact:
        switch_mac_findings: "{{ switch_mac_findings + [ result_obj ] }}"
      vars:
        result_obj:
          switch: "{{ item.item.switch }}"
          mac: "{{ item.item.mac }}"
          interface: "{{ item.item.interface }}"
          nacced: "{{ 'yes' if nac_acl_line in item.stdout[0] else 'no' }}"
          reason: "{{ 'acl_present' if nac_acl_line in item.stdout[0] else 'acl_absent' }}"
      loop: "{{ int_config.results | default([]) }}"
      when: item.skipped is not defined

  post_tasks:
    - name: Write data files for CSV generation
      copy:
        content: "{{ item.data | to_json }}"
        dest: "{{ item.dest }}"
      loop:
        - dest: /tmp/.nac_header.json
          data: "{{ hostvars['localhost'].csv_input_data.header }}"
        - dest: /tmp/.nac_rows.json
          data: "{{ hostvars['localhost'].csv_input_data.rows }}"
        - dest: /tmp/.nac_findings.json
          data: >-
            {{
              ansible_play_hosts_all
              | map('extract', hostvars, 'switch_mac_findings')
              | select('defined')
              | list
              | flatten
            }}
      run_once: true
      delegate_to: localhost

    - name: Write output CSV with NAC results after the MAC column
      shell: |
        {{ ansible_playbook_python | quote }} - <<'PY'
        import ast
        import csv
        import json
        import os

        def parse_file(path):
            with open(path, "r", encoding="utf-8") as f:
                raw = f.read()
            try:
                return json.loads(raw)
            except (json.JSONDecodeError, ValueError):
                return ast.literal_eval(raw)

        header = parse_file("/tmp/.nac_header.json")
        rows = parse_file("/tmp/.nac_rows.json")
        findings = parse_file("/tmp/.nac_findings.json")
        output_path = os.environ["CSV_OUTPUT_PATH"]
        column_number = int(os.environ["CSV_MAC_COLUMN_NUMBER"])
        insert_index = column_number

        result_headers = ["switch", "interface", "nacced", "reason"]

        def unique_preserve(values):
            seen = set()
            output = []
            for value in values:
                if value and value not in seen:
                    seen.add(value)
                    output.append(value)
            return output

        findings_by_mac = {}
        for item in findings:
            findings_by_mac.setdefault(item.get("mac", ""), []).append(item)

        # Real interface findings take precedence over port-channel exclusions
        for mac_key in findings_by_mac:
            entries = findings_by_mac[mac_key]
            real = [e for e in entries if e.get("reason") != "learned_on_port_channel"]
            if real:
                findings_by_mac[mac_key] = real

        output_dir = os.path.dirname(output_path)
        if output_dir:
            os.makedirs(output_dir, exist_ok=True)

        with open(output_path, "w", newline="", encoding="utf-8") as handle:
            writer = csv.writer(handle)
            writer.writerow(
                header[:insert_index] + result_headers + header[insert_index:]
            )

            for row in rows:
                columns = row.get("columns", [])
                mac = row.get("mac", "")
                lookup_reason = row.get("mac_lookup_reason", "")

                if lookup_reason == "empty_mac":
                    result = {
                        "switch": "",
                        "interface": "",
                        "nacced": "unknown",
                        "reason": "empty_mac",
                    }
                elif lookup_reason == "invalid_mac_format":
                    result = {
                        "switch": "",
                        "interface": "",
                        "nacced": "unknown",
                        "reason": "invalid_mac_format",
                    }
                else:
                    matches = findings_by_mac.get(mac, [])
                    if matches:
                        result = {
                            "switch": "; ".join(
                                unique_preserve(
                                    [item.get("switch", "") for item in matches]
                                )
                            ),
                            "interface": "; ".join(
                                unique_preserve(
                                    [item.get("interface", "") for item in matches]
                                )
                            ),
                            "nacced": "; ".join(
                                unique_preserve(
                                    [item.get("nacced", "") for item in matches]
                                )
                            ),
                            "reason": "; ".join(
                                unique_preserve(
                                    [item.get("reason", "") for item in matches]
                                )
                            ),
                        }
                    else:
                        result = {
                            "switch": "",
                            "interface": "NOT_FOUND",
                            "nacced": "unknown",
                            "reason": "mac_not_found",
                        }

                writer.writerow(
                    columns[:insert_index]
                    + [
                        result["switch"],
                        result["interface"],
                        result["nacced"],
                        result["reason"],
                    ]
                    + columns[insert_index:]
                )

        print(json.dumps({"output_path": output_path, "rows_written": len(rows)}))
        PY
      args:
        executable: /bin/sh
      environment:
        CSV_OUTPUT_PATH: "{{ csv_output_path }}"
        CSV_MAC_COLUMN_NUMBER: "{{ csv_mac_column_number }}"
      register: csv_output_raw
      changed_when: true
      run_once: true
      delegate_to: localhost

    - name: Show output file summary
      debug:
        msg: "{{ (csv_output_raw.stdout | from_json).output_path }}"
      run_once: true
